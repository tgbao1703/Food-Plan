services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: foodplan
      POSTGRES_USER: foodplan
      POSTGRES_PASSWORD: foodplan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DEBUG: "1"
      DJANGO_SECRET_KEY: dev-secret-key
      POSTGRES_DB: foodplan
      POSTGRES_USER: foodplan
      POSTGRES_PASSWORD: foodplan
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      ALLOWED_HOSTS: "*"
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  pgdata:
